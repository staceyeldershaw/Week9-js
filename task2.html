  <p>Open the browser console (F12 → Console) to see your output.</p>

  <script>

    // ============================================================

    // Name: ___________________________
    // ============================================================
    // IMPORTANT: Invent your OWN character name and catchphrase.
    // Don't use a famous character (no Spider-Man, no Moana, etc.)
    // Make something up — it can be silly, that's fine!
    // ============================================================


    // TODO: Create an object called `character` with three properties:
    //   name      → a name you invented (string)
    //   power     → a string describing what they can do
    //   level     → a number between 1 and 100




    // TODO: Print character.name to the console




    // TODO: Write a // comment here explaining what updating a property
    // does to the object, then change character.level to a NEW number
    // using dot notation.




    // TODO: Print the updated character.level




    // TODO: Add a brand new property called `catchphrase` with a string
    // you made up yourself, then print it.
    const character = { // This line creates an object called `character` with the specified properties and values.
      name: "Zara", // This line sets the `name` property of the `character` object to the string "Zara".
      power: "Invisibility", // This line sets the `power` property of the `character` object to the string "Invisibility".
      level: 50 // This line sets the `level` property of the `character` object to the number 50.
    }
    console.log(character.name); // This line outputs the value of the `name` property of the `character` object to the console.
    character.level = 75; // This line updates the `level` property of the `character` object to a new number (75) using dot notation. Updating a property changes the value associated with that property in the object.
    console.log(character.level); // This line outputs the updated value of the `level` property of the `character` object to the console.
    character.catchphrase = "You can't see me!"; // This line adds a new property called `catchphrase` to the `character` object and assigns it the string "You can't see me!".
    console.log(character.catchphrase); // This line will output the value of the `catchphrase` property of the `character` object to the console.
  </script>
